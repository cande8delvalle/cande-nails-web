<!DOCTYPE html>
<!--Especifica el Idioma-->
<html lang="es">
<!--contine toda la config de la pagina-->    
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trabajos - Cande Nails Concept</title>
    <link rel="icon" type="image/png" href="img/logonails.ico"/>
    
</head>
<body>
  <div id="navbar"></div>

  <!-- contenido de trabajos -->

  <div class="gradient-hero">
    <div class="container">
      <div class="row justify-content-center text-center">
        <div class="col-lg-8">
          <h1>Trabajos</h1>
        </div>
      </div>
    </div>
  </div>

  <!-- Carrusel -->

  <div id="carouselExampleSlidesOnly" class="carousel slide carousel-dark" data-bs-ride="carousel">
    <div class="carousel-inner">

      <!-- SLIDE 1 -->
      <div class="carousel-item active">
        <div class="card mb-3 mx-auto shadow">
          <div class="row g-0 align-items-center">
            <div class="col-md-5">
              <img src="img/nails.jpg" class="img-fluid rounded-start" alt="uñas">
            </div>
            <div class="col-md-7">
              <div class="card-body">
                <i class="bi bi-quote"></i>
                <h5 class="card-title">Andrea</h5>
                <p class="card-text">Excelente servicio. Muy buena atención.</p>
                <p class="card-description">★★★★★</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- SLIDE 2 -->
      <div class="carousel-item">
        <div class="card mb-3 mx-auto shadow">
          <div class="row g-0 align-items-center">
            <div class="col-md-5">
              <img src="img/trabajos.jpg" class="img-fluid rounded-start" alt="uñas">
            </div>
            <div class="col-md-7">
              <div class="card-body">
                <i class="bi bi-quote"></i>
                <h5 class="card-title">Maria Paz</h5>
                <p class="card-text">Me encantó el resultado, súper prolijo y delicado. Volvería mil veces.</p>
                <p class="card-description">★★★★★</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- SLIDE 3 -->
      <div class="carousel-item">
        <div class="card mb-3 mx-auto shadow">
          <div class="row g-0 align-items-center">
            <div class="col-md-5">
              <img src="img/uñas.jpg" class="img-fluid rounded-start" alt="uñas">
            </div>
            <div class="col-md-7">
              <div class="card-body">
                <i class="bi bi-quote"></i>
                <h5 class="card-title">Guillermina</h5>
                <p class="card-text">“Súper recomendable. Atención divina y uñas impecables.”</p>
                <p class="card-description">★★★★★</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- SLIDE 4 -->
      <div class="carousel-item">
        <div class="card mb-3 mx-auto shadow">
          <div class="row g-0 align-items-center">
            <div class="col-md-5">
              <img src="img/servicio.jpg" class="img-fluid rounded-start" alt="uñas">
            </div>
            <div class="col-md-7">
              <div class="card-body">
                <i class="bi bi-quote"></i>
                <h5 class="card-title">Valentina</h5>
                <p class="card-text">Amé mis uñas, quedaron tal cual las imaginé.</p>
                <p class="card-description">★★★★★</p>
              </div>
            </div>
          </div>
        </div>
      </div>

  </div>

  <!-- Controles del Carrusel -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleSlidesOnly" data-bs-slide="prev" style="width: 10%;">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Anterior</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleSlidesOnly" data-bs-slide="next" style="width: 10%;">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Siguiente</span>
  </button>
</div>

  

  

 <!--<i class="bi bi-arrow-left"></i>-->

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
